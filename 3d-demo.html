<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Cosmos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; }

  .overlay {
    position: fixed;
    bottom: 8%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    font-family: 'Helvetica Neue', system-ui, sans-serif;
  }

  .overlay h1 {
    font-size: clamp(2rem, 6vw, 5rem);
    font-weight: 100;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    background: linear-gradient(135deg, #00f0ff, #b967ff, #ff6b9d, #00f0ff);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s ease-in-out infinite;
  }

  .overlay p {
    font-size: clamp(0.6rem, 1.2vw, 0.9rem);
    letter-spacing: 0.8em;
    color: rgba(255,255,255,0.25);
    margin-top: 12px;
  }

  @keyframes shimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 5;
  }
</style>
</head>
<body>

<div class="overlay">
  <h1>Neon Cosmos</h1>
  <p>Move mouse to explore</p>
</div>
<div class="vignette"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── Setup ───────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000011, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 18);

// ─── Post-processing (bloom) ─────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5,   // strength
  0.4,   // radius
  0.2    // threshold
);
composer.addPass(bloom);

// ─── Lights ──────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x111122, 0.5));

const pointLight1 = new THREE.PointLight(0x00f0ff, 3, 40);
pointLight1.position.set(5, 8, 5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xb967ff, 3, 40);
pointLight2.position.set(-5, 4, -5);
scene.add(pointLight2);

const pointLight3 = new THREE.PointLight(0xff6b9d, 2, 30);
pointLight3.position.set(0, -3, 8);
scene.add(pointLight3);

// ─── Materials ───────────────────────────────────────────────────────
const crystalMat = new THREE.MeshPhysicalMaterial({
  color: 0x4488ff,
  metalness: 0.1,
  roughness: 0.05,
  transmission: 0.9,
  thickness: 2.0,
  ior: 2.3,
  transparent: true,
  opacity: 0.85,
  envMapIntensity: 1.0,
  side: THREE.DoubleSide,
});

const glowMat = (color) => new THREE.MeshStandardMaterial({
  color,
  emissive: color,
  emissiveIntensity: 0.8,
  transparent: true,
  opacity: 0.7,
  side: THREE.DoubleSide,
});

const wireMat = (color) => new THREE.MeshStandardMaterial({
  color,
  emissive: color,
  emissiveIntensity: 1.2,
  wireframe: true,
  transparent: true,
  opacity: 0.4,
});

// ─── Central Icosahedron ─────────────────────────────────────────────
const icoGeo = new THREE.IcosahedronGeometry(2.5, 1);
const centralIco = new THREE.Mesh(icoGeo, crystalMat);
scene.add(centralIco);

// Wireframe overlay on central piece
const icoWire = new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.7, 1),
  wireMat(0x00f0ff)
);
scene.add(icoWire);

// Inner glowing core
const coreMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  emissive: 0xb967ff,
  emissiveIntensity: 2,
  transparent: true,
  opacity: 0.6,
});
const core = new THREE.Mesh(new THREE.IcosahedronGeometry(1.0, 2), coreMat);
scene.add(core);

// ─── Orbiting Rings ──────────────────────────────────────────────────
const rings = [];
const ringData = [
  { radius: 4.5, tube: 0.02, color: 0x00f0ff, speed: 0.3, tiltX: Math.PI * 0.4, tiltZ: 0 },
  { radius: 5.5, tube: 0.02, color: 0xb967ff, speed: -0.2, tiltX: Math.PI * 0.3, tiltZ: Math.PI * 0.2 },
  { radius: 6.5, tube: 0.015, color: 0xff6b9d, speed: 0.15, tiltX: Math.PI * 0.5, tiltZ: Math.PI * -0.15 },
];

ringData.forEach(({ radius, tube, color, speed, tiltX, tiltZ }) => {
  const geo = new THREE.TorusGeometry(radius, tube, 16, 120);
  const mat = new THREE.MeshStandardMaterial({
    color,
    emissive: color,
    emissiveIntensity: 2,
    transparent: true,
    opacity: 0.8,
  });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = tiltX;
  ring.rotation.z = tiltZ;
  ring.userData = { speed, baseRotX: tiltX, baseRotZ: tiltZ };
  scene.add(ring);
  rings.push(ring);
});

// ─── Floating Polyhedra ──────────────────────────────────────────────
const floaters = [];
const geoTypes = [
  () => new THREE.OctahedronGeometry(0.5, 0),
  () => new THREE.TetrahedronGeometry(0.5, 0),
  () => new THREE.DodecahedronGeometry(0.4, 0),
  () => new THREE.IcosahedronGeometry(0.35, 0),
];
const colors = [0x00f0ff, 0xb967ff, 0xff6b9d, 0x50fa7b, 0xf1fa8c];

for (let i = 0; i < 35; i++) {
  const geo = geoTypes[Math.floor(Math.random() * geoTypes.length)]();
  const color = colors[Math.floor(Math.random() * colors.length)];
  const useWire = Math.random() > 0.5;

  const mat = useWire ? wireMat(color) : glowMat(color);
  const mesh = new THREE.Mesh(geo, mat);

  const angle = Math.random() * Math.PI * 2;
  const dist = 6 + Math.random() * 14;
  const y = (Math.random() - 0.5) * 12;

  mesh.position.set(Math.cos(angle) * dist, y, Math.sin(angle) * dist);
  mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);

  mesh.userData = {
    angle,
    dist,
    baseY: y,
    rotSpeedX: (Math.random() - 0.5) * 0.02,
    rotSpeedY: (Math.random() - 0.5) * 0.02,
    orbitSpeed: (Math.random() - 0.5) * 0.002,
    bobSpeed: 0.5 + Math.random() * 1.5,
    bobAmp: 0.3 + Math.random() * 0.8,
  };

  scene.add(mesh);
  floaters.push(mesh);
}

// ─── Particle Field ──────────────────────────────────────────────────
const particleCount = 2000;
const particlePositions = new Float32Array(particleCount * 3);
const particleColors = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
  const i3 = i * 3;
  const r = 5 + Math.random() * 40;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);

  particlePositions[i3] = r * Math.sin(phi) * Math.cos(theta);
  particlePositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  particlePositions[i3 + 2] = r * Math.cos(phi);

  const c = new THREE.Color(colors[Math.floor(Math.random() * colors.length)]);
  particleColors[i3] = c.r;
  particleColors[i3 + 1] = c.g;
  particleColors[i3 + 2] = c.b;

  particleSizes[i] = 0.5 + Math.random() * 2;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ─── Grid Floor ──────────────────────────────────────────────────────
const gridGeo = new THREE.PlaneGeometry(80, 80, 80, 80);
const gridMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a2e,
  emissive: 0x1a1a4e,
  emissiveIntensity: 0.3,
  wireframe: true,
  transparent: true,
  opacity: 0.15,
});
const grid = new THREE.Mesh(gridGeo, gridMat);
grid.rotation.x = -Math.PI / 2;
grid.position.y = -6;
scene.add(grid);

// Animate grid vertices for a wave effect
const gridPosAttr = gridGeo.getAttribute('position');
const gridOrigY = new Float32Array(gridPosAttr.count);
for (let i = 0; i < gridPosAttr.count; i++) {
  gridOrigY[i] = gridPosAttr.getZ(i); // z in local space = y in world (plane is rotated)
}

// ─── Mouse Tracking ──────────────────────────────────────────────────
let mouse = { x: 0, y: 0 };
let smoothMouse = { x: 0, y: 0 };

document.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
  mouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ─── Resize ──────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ──────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();

  // Smooth mouse
  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.04;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.04;

  // Camera orbit based on mouse
  const camAngle = smoothMouse.x * 0.5;
  const camHeight = 2 + smoothMouse.y * -3;
  camera.position.x = Math.sin(camAngle) * 18;
  camera.position.y = camHeight;
  camera.position.z = Math.cos(camAngle) * 18;
  camera.lookAt(0, 0, 0);

  // Central icosahedron
  centralIco.rotation.x = t * 0.15;
  centralIco.rotation.y = t * 0.2;
  icoWire.rotation.x = t * 0.15 + 0.1;
  icoWire.rotation.y = t * 0.2 + 0.1;
  core.rotation.y = -t * 0.3;
  const pulse = 0.9 + Math.sin(t * 2) * 0.1;
  core.scale.setScalar(pulse);

  // Lights orbit
  pointLight1.position.x = Math.sin(t * 0.5) * 8;
  pointLight1.position.z = Math.cos(t * 0.5) * 8;
  pointLight2.position.x = Math.sin(t * 0.3 + 2) * 7;
  pointLight2.position.z = Math.cos(t * 0.3 + 2) * 7;
  pointLight3.position.x = Math.sin(t * 0.4 + 4) * 6;
  pointLight3.position.z = Math.cos(t * 0.4 + 4) * 6;

  // Rings
  rings.forEach((ring) => {
    ring.rotation.z += ring.userData.speed * 0.01;
  });

  // Floaters
  floaters.forEach((f) => {
    f.userData.angle += f.userData.orbitSpeed;
    f.position.x = Math.cos(f.userData.angle) * f.userData.dist;
    f.position.z = Math.sin(f.userData.angle) * f.userData.dist;
    f.position.y = f.userData.baseY + Math.sin(t * f.userData.bobSpeed) * f.userData.bobAmp;
    f.rotation.x += f.userData.rotSpeedX;
    f.rotation.y += f.userData.rotSpeedY;
  });

  // Particles slow rotation
  particles.rotation.y += 0.0003;
  particles.rotation.x += 0.0001;

  // Grid wave
  for (let i = 0; i < gridPosAttr.count; i++) {
    const x = gridPosAttr.getX(i);
    const y = gridPosAttr.getY(i);
    const dist = Math.sqrt(x * x + y * y);
    gridPosAttr.setZ(i, Math.sin(dist * 0.3 - t * 1.5) * 0.8 * Math.max(0, 1 - dist / 40));
  }
  gridPosAttr.needsUpdate = true;

  // Bloom pulsation
  bloom.strength = 1.3 + Math.sin(t * 0.8) * 0.3;

  composer.render();
}

animate();
</script>

</body>
</html>
