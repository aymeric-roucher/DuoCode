<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Geometric World</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    overflow: hidden;
    height: 100vh;
    font-family: 'Helvetica Neue', sans-serif;
    cursor: crosshair;
  }

  .scene {
    position: fixed;
    top: 50%;
    left: 50%;
    transform-style: preserve-3d;
    perspective: 1200px;
  }

  /* === Floating title === */
  .title {
    position: fixed;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.08);
    font-size: 6vw;
    font-weight: 800;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    pointer-events: none;
    z-index: 0;
    user-select: none;
  }

  .subtitle {
    position: fixed;
    bottom: 6%;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.25);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    pointer-events: none;
    z-index: 10;
  }

  /* === Central cube === */
  .cube-wrap {
    position: absolute;
    top: -80px;
    left: -80px;
    width: 160px;
    height: 160px;
    transform-style: preserve-3d;
    animation: float 6s ease-in-out infinite;
  }

  .cube {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    animation: spin 20s linear infinite;
  }

  .cube .face {
    position: absolute;
    width: 160px;
    height: 160px;
    border: 2px solid rgba(100, 200, 255, 0.3);
    background: rgba(100, 200, 255, 0.04);
    backdrop-filter: blur(2px);
  }

  .cube .front  { transform: translateZ(80px); }
  .cube .back   { transform: rotateY(180deg) translateZ(80px); }
  .cube .right  { transform: rotateY(90deg) translateZ(80px); }
  .cube .left   { transform: rotateY(-90deg) translateZ(80px); }
  .cube .top    { transform: rotateX(90deg) translateZ(80px); }
  .cube .bottom { transform: rotateX(-90deg) translateZ(80px); }

  /* === Orbiting rings === */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid;
    transform-style: preserve-3d;
    top: 50%;
    left: 50%;
  }

  .ring-1 {
    width: 340px; height: 340px;
    margin: -170px 0 0 -170px;
    border-color: rgba(255, 100, 200, 0.25);
    animation: orbit1 12s linear infinite;
  }

  .ring-2 {
    width: 440px; height: 440px;
    margin: -220px 0 0 -220px;
    border-color: rgba(100, 255, 180, 0.2);
    animation: orbit2 18s linear infinite;
  }

  .ring-3 {
    width: 560px; height: 560px;
    margin: -280px 0 0 -280px;
    border-color: rgba(255, 200, 80, 0.15);
    animation: orbit3 25s linear infinite;
  }

  /* Small orbiting dots on rings */
  .ring::after {
    content: '';
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    top: -4px;
    left: 50%;
    margin-left: -4px;
  }

  .ring-1::after { background: rgba(255, 100, 200, 0.8); box-shadow: 0 0 15px rgba(255, 100, 200, 0.6); }
  .ring-2::after { background: rgba(100, 255, 180, 0.8); box-shadow: 0 0 15px rgba(100, 255, 180, 0.6); }
  .ring-3::after { background: rgba(255, 200, 80, 0.8); box-shadow: 0 0 15px rgba(255, 200, 80, 0.6); }

  /* === Floating particles === */
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: -1;
  }

  .particle {
    position: absolute;
    border-radius: 50%;
    background: white;
    opacity: 0;
    animation: twinkle var(--dur) var(--delay) ease-in-out infinite;
  }

  /* === Floating octahedron (diamond) === */
  .octa-wrap {
    position: absolute;
    top: -40px;
    left: -40px;
    width: 80px;
    height: 80px;
    transform-style: preserve-3d;
  }

  .octa-group {
    position: absolute;
    left: 200px;
    top: -200px;
    transform-style: preserve-3d;
    animation: float2 5s ease-in-out infinite, spin2 15s linear infinite;
  }

  .octa-group-2 {
    position: absolute;
    left: -260px;
    top: 140px;
    transform-style: preserve-3d;
    animation: float3 7s ease-in-out infinite, spin3 22s linear infinite;
  }

  .pyramid-face {
    position: absolute;
    width: 0; height: 0;
    border-left: 40px solid transparent;
    border-right: 40px solid transparent;
    border-bottom: 70px solid rgba(255, 150, 50, 0.12);
    transform-origin: 50% 100%;
  }

  .pyramid-face.pf1 { transform: rotateY(0deg) rotateX(-30deg) translateZ(0); border-bottom-color: rgba(255, 150, 50, 0.15); }
  .pyramid-face.pf2 { transform: rotateY(90deg) rotateX(-30deg) translateZ(0); border-bottom-color: rgba(255, 100, 50, 0.12); }
  .pyramid-face.pf3 { transform: rotateY(180deg) rotateX(-30deg) translateZ(0); border-bottom-color: rgba(255, 150, 50, 0.10); }
  .pyramid-face.pf4 { transform: rotateY(270deg) rotateX(-30deg) translateZ(0); border-bottom-color: rgba(255, 200, 50, 0.12); }

  /* === Grid floor === */
  .grid {
    position: absolute;
    width: 1000px;
    height: 1000px;
    top: 200px;
    left: -500px;
    transform: rotateX(70deg);
    background-image:
      linear-gradient(rgba(100, 200, 255, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(100, 200, 255, 0.08) 1px, transparent 1px);
    background-size: 50px 50px;
    mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black, transparent);
    -webkit-mask-image: radial-gradient(ellipse 60% 60% at 50% 50%, black, transparent);
  }

  /* === Glow orb === */
  .glow {
    position: absolute;
    width: 300px; height: 300px;
    top: -150px; left: -150px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100, 150, 255, 0.12) 0%, transparent 70%);
    pointer-events: none;
    animation: pulse 4s ease-in-out infinite;
  }

  /* === Keyframes === */
  @keyframes spin {
    from { transform: rotateX(0) rotateY(0); }
    to   { transform: rotateX(360deg) rotateY(360deg); }
  }

  @keyframes spin2 {
    from { transform: rotateY(0) rotateZ(0); }
    to   { transform: rotateY(360deg) rotateZ(360deg); }
  }

  @keyframes spin3 {
    from { transform: rotateX(0) rotateZ(0); }
    to   { transform: rotateX(360deg) rotateZ(360deg); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-25px); }
  }

  @keyframes float2 {
    0%, 100% { transform: translateY(0) translateX(0); }
    50%      { transform: translateY(-18px) translateX(10px); }
  }

  @keyframes float3 {
    0%, 100% { transform: translateY(0); }
    33%      { transform: translateY(15px); }
    66%      { transform: translateY(-12px); }
  }

  @keyframes orbit1 {
    from { transform: rotateX(70deg) rotateZ(0); }
    to   { transform: rotateX(70deg) rotateZ(360deg); }
  }

  @keyframes orbit2 {
    from { transform: rotateX(55deg) rotateY(30deg) rotateZ(0); }
    to   { transform: rotateX(55deg) rotateY(30deg) rotateZ(360deg); }
  }

  @keyframes orbit3 {
    from { transform: rotateX(40deg) rotateY(-20deg) rotateZ(0); }
    to   { transform: rotateX(40deg) rotateY(-20deg) rotateZ(360deg); }
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50%      { opacity: var(--alpha); transform: scale(1); }
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  /* === Scan lines (subtle CRT feel) === */
  .scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0, 0, 0, 0.03) 3px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div class="title">DUOCODE</div>
<div class="subtitle">move your mouse to explore</div>

<div class="scene" id="scene">
  <!-- Central glow -->
  <div class="glow"></div>

  <!-- Grid floor -->
  <div class="grid"></div>

  <!-- Orbiting rings -->
  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

  <!-- Central cube -->
  <div class="cube-wrap">
    <div class="cube">
      <div class="face front"></div>
      <div class="face back"></div>
      <div class="face right"></div>
      <div class="face left"></div>
      <div class="face top"></div>
      <div class="face bottom"></div>
    </div>
  </div>

  <!-- Floating shapes -->
  <div class="octa-group">
    <div class="octa-wrap">
      <div class="pyramid-face pf1"></div>
      <div class="pyramid-face pf2"></div>
      <div class="pyramid-face pf3"></div>
      <div class="pyramid-face pf4"></div>
    </div>
  </div>

  <div class="octa-group-2">
    <div class="octa-wrap">
      <div class="pyramid-face pf1"></div>
      <div class="pyramid-face pf2"></div>
      <div class="pyramid-face pf3"></div>
      <div class="pyramid-face pf4"></div>
    </div>
  </div>
</div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Scanlines overlay -->
<div class="scanlines"></div>

<script>
  // Generate starfield particles
  const particlesEl = document.getElementById('particles');
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 2.5 + 1;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + '%';
    p.style.top = Math.random() * 100 + '%';
    p.style.setProperty('--dur', (Math.random() * 4 + 3) + 's');
    p.style.setProperty('--delay', (Math.random() * 5) + 's');
    p.style.setProperty('--alpha', (Math.random() * 0.5 + 0.2).toString());
    particlesEl.appendChild(p);
  }

  // Mouse-driven parallax
  const scene = document.getElementById('scene');
  let targetX = 0, targetY = 0;
  let currentX = 0, currentY = 0;

  document.addEventListener('mousemove', (e) => {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    targetX = (e.clientX - cx) / cx;  // -1 to 1
    targetY = (e.clientY - cy) / cy;
  });

  function animate() {
    // Smooth interpolation
    currentX += (targetX - currentX) * 0.06;
    currentY += (targetY - currentY) * 0.06;

    const rotY = currentX * 20;
    const rotX = -currentY * 15;
    const moveX = currentX * 30;
    const moveY = currentY * 20;

    scene.style.transform =
      `translate(${-50 + moveX}%, ${-50 + moveY}%) ` +
      `perspective(1200px) ` +
      `rotateX(${rotX}deg) ` +
      `rotateY(${rotY}deg)`;

    requestAnimationFrame(animate);
  }

  animate();
</script>
</body>
</html>
